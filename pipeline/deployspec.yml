#
# deployspec.yml
#

version: 0.2

env:
  variables:
    deploy_bucket: aptrust-submit-lambda-deployable

phases:
  install:
    runtime-versions:
      golang: 1.x
#    commands:

#  pre_build:
#    commands:

  build:
    commands:
      #
      # apt-submit-approve function
      - aws lambda update-function-code --function-name uva-apt-submit-approve-staging --s3-bucket ${deploy_bucket} --s3-key latest/apt-submit-approve/deployment.zip
      #
      # apt-submit-bag-status function
      #- aws lambda update-function-code --function-name uva-apt-submit-bag-status-staging --s3-bucket ${deploy_bucket} --s3-key latest/apt-submit-bag-status/deployment.zip
      #
      # apt-submit-event-audit function
      - aws lambda update-function-code --function-name uva-apt-submit-event-audit-staging --s3-bucket ${deploy_bucket} --s3-key latest/apt-submit-event-audit/deployment.zip
      #
      # apt-submit-ingest-status function
      - aws lambda update-function-code --function-name uva-apt-submit-ingest-status-staging --s3-bucket ${deploy_bucket} --s3-key latest/apt-submit-ingest-status/deployment.zip
      #
      # apt-submit-mailer function
      - aws lambda update-function-code --function-name uva-apt-submit-mailer-staging --s3-bucket ${deploy_bucket} --s3-key latest/apt-submit-mailer/deployment.zip
      #
      # apt-submit-schedule function
      - aws lambda update-function-code --function-name uva-apt-submit-schedule-staging --s3-bucket ${deploy_bucket} --s3-key latest/apt-submit-schedule/deployment.zip
      #
      #
      # apt-submit-state-manager function
      - aws lambda update-function-code --function-name uva-apt-submit-state-manager-staging --s3-bucket ${deploy_bucket} --s3-key latest/apt-submit-state-manager/deployment.zip
      #
      # apt-submit-submission-initiate function
      - aws lambda update-function-code --function-name uva-apt-submit-submission-initiate-staging --s3-bucket ${deploy_bucket} --s3-key latest/apt-submit-submission-initiate/deployment.zip
      #
      # apt-submit-submission-register function
      - aws lambda update-function-code --function-name uva-apt-submit-submission-register-staging --s3-bucket ${deploy_bucket} --s3-key latest/apt-submit-submission-register/deployment.zip
      #
      # apt-submit-submission-status function
      - aws lambda update-function-code --function-name uva-apt-submit-submission-status-staging --s3-bucket ${deploy_bucket} --s3-key latest/apt-submit-submission-status/deployment.zip

